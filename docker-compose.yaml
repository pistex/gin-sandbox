version: "3"

services:
  server:
    build:
      context: ./server
      dockerfile: ./docker/dev.Dockerfile
    container_name: kwanjai-server
    restart: always
    volumes:
      - ./server:/app
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy

  e2e:
    build:
      context: ./server
      dockerfile: ./docker/e2e.Dockerfile
    container_name: kwanjai-e2e-test
    depends_on:
      test-db:
        condition: service_healthy

  db:
    image: postgres:12.8-alpine3.14
    restart: always
    container_name: kwanjai-db
    environment:
      - POSTGRES_USER=my_user
      - POSTGRES_PASSWORD=my_password
      - POSTGRES_DB=my_database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d my_database -U my_user"]
      interval: 4s
      timeout: 4s
      retries: 8
    ports: 
      - 5432:5432
    volumes: 
      - ./.database:/var/lib/postgresql/data

  db-migration:
    image: flyway/flyway
    command: -url=jdbc:postgresql://db/my_database -user=my_user -password=my_password migrate
    container_name: kwanjai-db-migration
    volumes:
      - ./server/database/migration:/flyway/sql
    depends_on:
      db:
        condition: service_healthy

  test-db:
    image: postgres:12.8-alpine3.14
    restart: always
    container_name: kwanjai-test-db
    environment:
      - POSTGRES_USER=my_test_user
      - POSTGRES_PASSWORD=my_test_password
      - POSTGRES_DB=my_test_database
    ports: 
      - 54321:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d my_test_database -U my_test_user"]
      interval: 4s
      timeout: 4s
      retries: 8
  
  test-db-migration:
    image: flyway/flyway
    command: -url=jdbc:postgresql://test-db/my_test_database -user=my_test_user -password=my_test_password migrate
    container_name: kwanjai-test-db-migration
    volumes:
      - ./server/database/migration:/flyway/sql
    depends_on:
      test-db:
        condition: service_healthy